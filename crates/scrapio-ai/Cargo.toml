[package]
name = "scrapio-ai"
version = "0.1.0"
edition = "2024"
description = "AI-powered scraping for Scrapio"
license = "MIT"

[features]
default = ["openai"]
openai = []
anthropic = []
ollama = []

[dependencies]
scrapio-core = { path = "../scrapio-core" }
reqwest = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
scraper = "0.21"
regex = "1"

[dev-dependencies]
tokio = "1"